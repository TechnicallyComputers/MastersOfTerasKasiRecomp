[game]
name = "Star Wars: Masters of Teras Kasi"
id = "SLUS-00562"
players = 2
exe = "motk/SLUS_005.62"
disc = "motk/Star Wars - Masters of Teras Kasi (USA).bin"
load_address = "0x80010000"
entry_pc = "0x80065A44"
text_size = "0x0009B800"
stack_base = "0x801FFFF0"

[recompiler]
seeds = "seeds/ghidra_funcs.txt"
out_dir = "generated"
strict = true
# Intro FMV VLC leaves (phase_hot static samples) — host locality only.
hot_funcs = ["0x8006A9F8", "0x8006CBE4"]

[runtime]
debug_port = 4520
window_title = "Masters of Teras Kasi Recompiled"
memcard_dir = "saves"
disc_speed = "4x"
bios_hle = true
bios_hle_keep_intro = false
fast_boot = false
overlay_cache = true
overlay_backend = "auto"
turbo_loads = true
turbo_audio_sink = true
idle_skip = true
# Enhancement: force load-delay off for the offline session. MotK A/B
# 2026-07-22: session arm → ~450 FPS but intro STR never starts MDEC
# (same failure mode as load_accel.vsync_query). Keep OFF; faithful
# delay holds ~45–55 intro FPS. Env PSX_FMV_LOAD_DELAY_RELAX=1 to A/B.
fmv_load_delay_relax = false

# load_accel.vsync_query is intentionally OFF for MotK.
# A/B 2026-07-18: with VSync(-1) HLE enabled, intro STR never starts MDEC
# (mdec_decode_count stayed 0, display disabled). With it disabled, MDEC/XA
# run. Event-horizon_any made that worse (raced guest time). Re-enable only
# after the HLE is validated against MotK FMV (not just the inter-movie gap).

[video]
renderer = "opengl"
aspect_ratio = "4:3"

[controller]
default_mode = "digital"
allow_hybrid = false
